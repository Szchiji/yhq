version: "3.8"

services:
  # ========== PostgreSQL 数据库 ==========
  postgres:
    image: postgres:15-alpine
    container_name: yhq_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-yhq_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-yhq_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-yhq_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - yhq_network

  # ========== Redis 缓存（可选）==========
  redis:
    image: redis:7-alpine
    container_name: yhq_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - yhq_network

  # ========== Telegram 机器人 ==========
  bot:
    build: .
    container_name: yhq_bot
    restart: unless-stopped
    env_file:
      - .env
    command: ["python", "main.py"]
    volumes:
      - ./data:/app/data
      - ./backups:/app/backups
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - yhq_network

  # ========== REST API (FastAPI) ==========
  api:
    build: .
    container_name: yhq_api
    restart: unless-stopped
    env_file:
      - .env
    command: ["python", "-m", "uvicorn", "api.app:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - yhq_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:

networks:
  yhq_network:
    driver: bridge
