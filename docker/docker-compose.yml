version: "3.8"

# 企业级报告系统 - 完整 Docker Compose 编排

services:
  # ─────────────────────────────────────────
  # 主 Bot 服务
  # ─────────────────────────────────────────
  bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: yhq_bot
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - BOT_MODE=polling
      - DATABASE_TYPE=postgresql
    volumes:
      - ../data:/app/data
      - ../backups:/app/backups
      - ../logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - yhq_network
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────
  # PostgreSQL 数据库
  # ─────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: yhq_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: yhq_db
      POSTGRES_USER: yhq_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - yhq_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yhq_user -d yhq_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Redis 缓存
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: yhq_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-change_me}
    volumes:
      - redis_data:/data
    networks:
      - yhq_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # miniapp Web 前端
  # ─────────────────────────────────────────
  miniapp:
    build:
      context: ../miniapp
      dockerfile: Dockerfile
    container_name: yhq_miniapp
    restart: unless-stopped
    environment:
      - MINIAPP_PORT=3000
      - API_BASE=http://bot:8080
    ports:
      - "3000:3000"
    networks:
      - yhq_network
    depends_on:
      - bot

volumes:
  postgres_data:
  redis_data:

networks:
  yhq_network:
    driver: bridge
